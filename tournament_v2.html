<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050814">
<title>Tournament — Live Standings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-1: #050814;
    --bg-2: #0a1228;
    --accent: #4d8bff;
    --accent-soft: #6ea3ff;
    --accent-glow: rgba(77, 139, 255, 0.45);
    --win: #4ade80;
    --win-glow: rgba(74, 222, 128, 0.4);
    --loss: #f87171;
    --text: #f1f4fb;
    --text-dim: #8a96b5;
    --text-mute: #5e6a8a;
    --glass: rgba(255, 255, 255, 0.045);
    --glass-strong: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.09);
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
  }

  html, body { height: 100%; overscroll-behavior-y: none; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg-1);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 50% at 50% 0%, rgba(77, 139, 255, 0.18), transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(118, 89, 255, 0.13), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%);
    z-index: -2;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
    background-size: 28px 28px;
    z-index: -1;
    pointer-events: none;
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 16px 100px;
  }

  /* ─── Header ─────────────────────────────── */
  header {
    margin-bottom: 28px;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--accent-soft);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .eyebrow::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(1.35); }
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 14px;
  }
  h1 .italic {
    font-style: italic;
    background: linear-gradient(135deg, var(--accent-soft), #b4c8ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .progress-pill {
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .progress-pill .text {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .progress-pill .text b {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 18px;
    color: var(--text);
    margin-right: 2px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    max-width: 140px;
  }
  .progress-bar div {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-soft));
    box-shadow: 0 0 12px var(--accent-glow);
    transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    border-radius: 2px;
  }

  /* ─── Tabs ─────────────────────────────── */
  .tabs {
    position: sticky;
    top: calc(var(--safe-top) + 8px);
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px;
    background: rgba(10, 18, 40, 0.7);
    border: 1px solid var(--border);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border-radius: 14px;
    margin-bottom: 20px;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 11px 12px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.02em;
  }
  .tab.active {
    background: var(--glass-strong);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* ─── Round cards ─────────────────────────────── */
  .round {
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border-radius: 20px;
    padding: 20px 16px;
    margin-bottom: 14px;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .round.locked {
    opacity: 0.4;
    filter: saturate(0.4);
    pointer-events: none;
  }
  .round.active {
    border-color: rgba(77, 139, 255, 0.32);
    box-shadow:
      0 0 0 1px rgba(77, 139, 255, 0.08),
      0 16px 48px -20px rgba(77, 139, 255, 0.3),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .round.completed { border-color: rgba(74, 222, 128, 0.22); }

  .round-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
  }
  .round-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .round-num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 32px;
    line-height: 1;
    color: var(--text-mute);
    letter-spacing: -0.02em;
  }
  .round.active .round-num { color: var(--accent-soft); }
  .round.completed .round-num { color: var(--win); }
  .round-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .round-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .round-status .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-mute);
  }
  .round.active .round-status {
    color: var(--accent-soft);
    background: rgba(77,139,255,0.08);
    border-color: rgba(77,139,255,0.25);
  }
  .round.active .round-status .dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 1.8s infinite;
  }
  .round.completed .round-status {
    color: var(--win);
    background: rgba(74,222,128,0.08);
    border-color: rgba(74,222,128,0.25);
  }
  .round.completed .round-status .dot { background: var(--win); }

  /* ─── Match card ─────────────────────────────── */
  .matches { display: flex; flex-direction: column; gap: 10px; }
  .match {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 14px 12px;
    transition: all 0.3s ease;
  }
  .match.decided {
    background: rgba(77,139,255,0.04);
    border-color: rgba(77,139,255,0.18);
  }

  /* Player row */
  .match-players {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .player {
    display: flex;
    align-items: center;
    gap: 9px;
    min-width: 0;
  }
  .player.right { justify-content: flex-end; flex-direction: row-reverse; }
  .player-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(77,139,255,0.28), rgba(118,89,255,0.15));
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .player-name {
    font-weight: 500;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .vs {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--text-mute);
    font-size: 14px;
  }

  /* Score badges */
  .match.match-won-p1 .player:not(.right) .player-avatar {
    box-shadow: 0 0 0 2px var(--win), 0 0 14px var(--win-glow);
  }
  .match.match-won-p2 .player.right .player-avatar {
    box-shadow: 0 0 0 2px var(--win), 0 0 14px var(--win-glow);
  }
  .match.match-won-p1 .player.right,
  .match.match-won-p2 .player:not(.right) { opacity: 0.45; }

  /* Sub-rounds */
  .sub-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-mute);
    text-align: center;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .subs { display: flex; flex-direction: column; gap: 7px; }
  .sub-row {
    display: grid;
    grid-template-columns: 22px 1fr 1fr;
    gap: 5px;
    align-items: center;
  }
  .sub-num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text-mute);
    text-align: center;
    line-height: 1;
  }
  .sub-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text-dim);
    padding: 9px 6px;
    border-radius: 9px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    letter-spacing: 0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-height: 38px;
  }
  .sub-btn:active:not(.active):not(:disabled) { transform: scale(0.96); }
  .sub-btn.active {
    background: linear-gradient(135deg, var(--win), #16a34a);
    border-color: var(--win);
    color: #04220e;
    box-shadow: 0 3px 12px -3px var(--win-glow);
    font-weight: 700;
  }
  .sub-btn:disabled { cursor: default; }

  /* Match summary */
  .match-summary {
    margin-top: 12px;
    padding: 9px 12px;
    background: rgba(255,255,255,0.025);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .match-summary .tally {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .match-summary .tally .sep { color: var(--text-mute); margin: 0 4px; }
  .match-summary .points {
    color: var(--text-dim);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .match-summary .points b {
    color: var(--win);
    font-weight: 700;
    font-size: 12px;
  }
  .match-summary .pending {
    color: var(--text-mute);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  /* Complete round */
  .complete-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--accent), #3b6fd9);
    border: none;
    border-radius: 13px;
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    box-shadow: 0 8px 24px -8px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2);
    min-height: 48px;
  }
  .complete-btn:active:not(:disabled) { transform: scale(0.98); }
  .complete-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    background: rgba(255,255,255,0.05);
    box-shadow: none;
    border: 1px solid var(--border);
  }
  .complete-btn .arrow { transition: transform 0.3s; }

  /* ─── Leaderboard ─────────────────────────────── */
  .leaderboard {
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border-radius: 20px;
    padding: 20px 18px;
  }
  .lb-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .lb-head h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 28px;
    letter-spacing: -0.02em;
  }
  .lb-head h2 .italic { font-style: italic; color: var(--accent-soft); }
  .lb-head .meta {
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .lb-cols {
    display: grid;
    grid-template-columns: 22px 1fr 24px 24px 40px;
    gap: 6px;
    padding: 0 12px 8px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .lb-cols span:nth-child(3),
  .lb-cols span:nth-child(4),
  .lb-cols span:nth-child(5) { text-align: center; }

  .lb-rows { padding-top: 4px; }
  .lb-row {
    display: grid;
    grid-template-columns: 22px 1fr 24px 24px 40px;
    gap: 6px;
    padding: 11px 12px;
    align-items: center;
    border-radius: 10px;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  .lb-row.rank-1 {
    background: linear-gradient(90deg, rgba(77,139,255,0.1), transparent);
  }
  .lb-row.rank-1::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 60%;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 8px var(--accent-glow);
    border-radius: 2px;
  }
  .lb-rank {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--text-mute);
    text-align: left;
    line-height: 1;
  }
  .lb-row.rank-1 .lb-rank {
    color: var(--accent-soft);
    font-style: italic;
  }
  .lb-name {
    font-weight: 500;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .lb-name .nm {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(77,139,255,0.22), rgba(118,89,255,0.12));
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .lb-stat {
    text-align: center;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
    font-weight: 500;
  }
  .lb-stat.w { color: var(--win); }
  .lb-stat.l { color: var(--loss); }
  .lb-pts {
    text-align: center;
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .lb-row.rank-1 .lb-pts {
    background: linear-gradient(135deg, #b4c8ff, var(--accent-soft));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Scoring rules card */
  .rules {
    margin-top: 16px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .rules .h {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent-soft);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .rules .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rules .row b {
    color: var(--text);
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 14px;
  }

  /* Champion */
  .champion {
    margin-top: 18px;
    padding: 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(77,139,255,0.14), rgba(118,89,255,0.06));
    border: 1px solid rgba(77,139,255,0.3);
    text-align: center;
    display: none;
    animation: champEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .champion.show { display: block; }
  @keyframes champEnter {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .champion .label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--accent-soft);
    margin-bottom: 6px;
  }
  .champion .name {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-style: italic;
    background: linear-gradient(135deg, #ffffff, var(--accent-soft));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Reset */
  .reset-row {
    display: flex;
    justify-content: center;
    margin-top: 28px;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    padding: 10px 22px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.25s ease;
    text-transform: uppercase;
  }
  .reset-btn:active {
    border-color: var(--loss);
    color: var(--loss);
    background: rgba(248,113,113,0.05);
  }

  /* Views */
  .view { display: none; }
  .view.active { display: block; animation: viewIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .round { animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
  .round:nth-child(1) { animation-delay: 0.04s; }
  .round:nth-child(2) { animation-delay: 0.09s; }
  .round:nth-child(3) { animation-delay: 0.14s; }
  .round:nth-child(4) { animation-delay: 0.19s; }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Larger viewport tweaks */
  @media (min-width: 540px) {
    .app { padding: 36px 24px 100px; }
    h1 { font-size: 52px; }
    .match { padding: 16px; }
    .sub-btn { font-size: 12px; padding: 10px 8px; }
    .player-name { font-size: 14px; }
  }

  /* iOS button reset */
  button {
    -webkit-appearance: none;
    appearance: none;
    font: inherit;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="eyebrow">Live Tournament</div>
    <h1>Round Robin<br><span class="italic">Standings</span></h1>
    <div class="progress-pill">
      <div class="text"><b id="completedCount">0</b> / 4 rounds done</div>
      <div class="progress-bar"><div id="progressFill" style="width: 0%"></div></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="matches">Matches</button>
    <button class="tab" data-view="standings">Standings</button>
  </div>

  <!-- Matches view -->
  <div class="view active" id="view-matches">
    <div id="roundsContainer"></div>
  </div>

  <!-- Standings view -->
  <div class="view" id="view-standings">
    <aside class="leaderboard">
      <div class="lb-head">
        <h2>Live <span class="italic">Table</span></h2>
        <div class="meta" id="lbMeta">Awaiting results</div>
      </div>
      <div class="lb-cols">
        <span>#</span><span>Player</span><span>W</span><span>L</span><span>Pts</span>
      </div>
      <div class="lb-rows" id="lbRows"></div>
      <div class="champion" id="champion">
        <div class="label">★ Tournament Champion ★</div>
        <div class="name" id="champName"></div>
      </div>
    </aside>

    <div class="rules">
      <div class="h">Scoring · best of 3 sub-rounds</div>
      <div class="row"><span>Sweep (3 – 0)</span><b>3 pts · 0 pts</b></div>
      <div class="row"><span>Close win (2 – 1)</span><b>2 pts · 1 pt</b></div>
    </div>

    <div class="reset-row">
      <button class="reset-btn" id="resetBtn">Reset Tournament</button>
    </div>
  </div>

</div>

<script>
  const PLAYERS = ['Amrender', 'Vedant', 'Anshul', 'Priyansh', 'Pranav', 'Nirdesh'];

  const ROUNDS = [
    [['Amrender','Vedant'], ['Anshul','Priyansh'], ['Pranav','Nirdesh']],
    [['Amrender','Anshul'], ['Vedant','Pranav'], ['Priyansh','Nirdesh']],
    [['Amrender','Pranav'], ['Vedant','Priyansh'], ['Anshul','Nirdesh']],
    [['Amrender','Priyansh'], ['Vedant','Nirdesh'], ['Anshul','Pranav']]
  ];

  // state.subResults[round][match] = ['p1' | 'p2' | null, ...3]
  // state.completed[round] = boolean
  const STORAGE_KEY = 'tournament_v2_state';

  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    return null;
  }
  function defaultState() {
    return {
      subResults: ROUNDS.map(round => round.map(() => [null, null, null])),
      completed: ROUNDS.map(() => false)
    };
  }
  let state = loadState() || defaultState();

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  const $rounds = document.getElementById('roundsContainer');
  const $lbRows = document.getElementById('lbRows');
  const $lbMeta = document.getElementById('lbMeta');
  const $completedCount = document.getElementById('completedCount');
  const $progressFill = document.getElementById('progressFill');
  const $champion = document.getElementById('champion');
  const $champName = document.getElementById('champName');
  const $resetBtn = document.getElementById('resetBtn');

  const initials = (n) => n.slice(0, 2).toUpperCase();

  function getActiveRoundIndex() {
    const idx = state.completed.indexOf(false);
    return idx === -1 ? ROUNDS.length : idx;
  }

  // Determine the match winner once all 3 sub-rounds are filled
  function matchOutcome(subs) {
    if (subs.some(s => s === null)) return null;
    const p1Wins = subs.filter(s => s === 'p1').length;
    const p2Wins = 3 - p1Wins;
    const winner = p1Wins > p2Wins ? 'p1' : 'p2';
    const winnerScore = Math.max(p1Wins, p2Wins);
    const loserScore = Math.min(p1Wins, p2Wins);
    // Sweep 3-0 → 3 pts to winner, 0 to loser; 2-1 → 2 / 1
    const winnerPts = winnerScore === 3 ? 3 : 2;
    const loserPts = winnerScore === 3 ? 0 : 1;
    return { winner, p1Wins, p2Wins, winnerPts, loserPts };
  }

  function renderRounds() {
    const activeIdx = getActiveRoundIndex();
    $rounds.innerHTML = '';

    ROUNDS.forEach((matches, rIdx) => {
      const isCompleted = state.completed[rIdx];
      const isActive = rIdx === activeIdx;
      const status = isCompleted ? 'Completed' : isActive ? 'In Progress' : 'Locked';
      const stateClass = isCompleted ? 'completed' : isActive ? 'active' : 'locked';

      const roundEl = document.createElement('section');
      roundEl.className = `round ${stateClass}`;
      roundEl.innerHTML = `
        <div class="round-head">
          <div class="round-title">
            <div class="round-num">0${rIdx + 1}</div>
            <div class="round-label">Round ${rIdx + 1}</div>
          </div>
          <div class="round-status"><span class="dot"></span><span>${status}</span></div>
        </div>
        <div class="matches"></div>
      `;

      const matchesEl = roundEl.querySelector('.matches');

      matches.forEach((match, mIdx) => {
        const subs = state.subResults[rIdx][mIdx];
        const outcome = matchOutcome(subs);
        const matchClass = outcome ? `decided match-won-${outcome.winner}` : '';

        const matchEl = document.createElement('div');
        matchEl.className = `match ${matchClass}`;

        const subRowsHtml = subs.map((sub, sIdx) => `
          <div class="sub-row">
            <div class="sub-num">${sIdx + 1}</div>
            <button class="sub-btn ${sub === 'p1' ? 'active' : ''}" data-r="${rIdx}" data-m="${mIdx}" data-s="${sIdx}" data-v="p1">${match[0]}</button>
            <button class="sub-btn ${sub === 'p2' ? 'active' : ''}" data-r="${rIdx}" data-m="${mIdx}" data-s="${sIdx}" data-v="p2">${match[1]}</button>
          </div>
        `).join('');

        let summaryHtml = '';
        if (outcome) {
          const winnerName = outcome.winner === 'p1' ? match[0] : match[1];
          summaryHtml = `
            <div class="match-summary">
              <div class="tally">${outcome.p1Wins}<span class="sep">–</span>${outcome.p2Wins}</div>
              <div class="points"><span>${winnerName}</span> <b>+${outcome.winnerPts} pts</b></div>
            </div>`;
        } else {
          const filled = subs.filter(s => s !== null).length;
          summaryHtml = `
            <div class="match-summary">
              <div class="pending">${filled}/3 sub-rounds played</div>
            </div>`;
        }

        matchEl.innerHTML = `
          <div class="match-players">
            <div class="player">
              <div class="player-avatar">${initials(match[0])}</div>
              <div class="player-name">${match[0]}</div>
            </div>
            <div class="vs">vs</div>
            <div class="player right">
              <div class="player-avatar">${initials(match[1])}</div>
              <div class="player-name">${match[1]}</div>
            </div>
          </div>
          <div class="sub-label">Sub-Rounds · Tap Winner</div>
          <div class="subs">${subRowsHtml}</div>
          ${summaryHtml}
        `;
        matchesEl.appendChild(matchEl);
      });

      if (!isCompleted) {
        // All matches in round must have all 3 sub-rounds filled
        const allFilled = state.subResults[rIdx].every(subs => subs.every(s => s !== null));
        const btn = document.createElement('button');
        btn.className = 'complete-btn';
        btn.disabled = !allFilled || !isActive;
        btn.innerHTML = allFilled
          ? `Complete Round ${rIdx + 1} <span class="arrow">→</span>`
          : `Fill all sub-rounds to continue`;
        btn.onclick = () => completeRound(rIdx);
        roundEl.appendChild(btn);
      }

      $rounds.appendChild(roundEl);
    });

    $rounds.querySelectorAll('.sub-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = +btn.dataset.r;
        const m = +btn.dataset.m;
        const s = +btn.dataset.s;
        const v = btn.dataset.v;
        if (state.completed[r]) return;
        // Toggle: same winner click → clear; different → switch
        state.subResults[r][m][s] = state.subResults[r][m][s] === v ? null : v;
        saveState();
        renderAll();
      });
    });
  }

  function completeRound(rIdx) {
    if (!state.subResults[rIdx].every(subs => subs.every(s => s !== null))) return;
    state.completed[rIdx] = true;
    saveState();
    renderAll();
  }

  function computeStandings() {
    const stats = {};
    PLAYERS.forEach(p => stats[p] = { name: p, w: 0, l: 0, pts: 0, subWins: 0 });

    ROUNDS.forEach((matches, rIdx) => {
      if (!state.completed[rIdx]) return;
      matches.forEach((match, mIdx) => {
        const outcome = matchOutcome(state.subResults[rIdx][mIdx]);
        if (!outcome) return;
        const [p1, p2] = match;
        const winnerName = outcome.winner === 'p1' ? p1 : p2;
        const loserName = outcome.winner === 'p1' ? p2 : p1;
        stats[winnerName].w++;
        stats[winnerName].pts += outcome.winnerPts;
        stats[loserName].l++;
        stats[loserName].pts += outcome.loserPts;
        stats[p1].subWins += outcome.p1Wins;
        stats[p2].subWins += outcome.p2Wins;
      });
    });

    return Object.values(stats).sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      if (b.w !== a.w) return b.w - a.w;
      return b.subWins - a.subWins;
    });
  }

  function renderLeaderboard() {
    const standings = computeStandings();
    const completedRounds = state.completed.filter(Boolean).length;

    $lbRows.innerHTML = '';
    standings.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = `lb-row rank-${i + 1}`;
      row.innerHTML = `
        <div class="lb-rank">${i + 1}</div>
        <div class="lb-name">
          <div class="lb-avatar">${initials(p.name)}</div>
          <div class="nm">${p.name}</div>
        </div>
        <div class="lb-stat w">${p.w}</div>
        <div class="lb-stat l">${p.l}</div>
        <div class="lb-pts">${p.pts}</div>
      `;
      $lbRows.appendChild(row);
    });

    if (completedRounds === 0) $lbMeta.textContent = 'Awaiting results';
    else if (completedRounds === ROUNDS.length) $lbMeta.textContent = 'Final standings';
    else $lbMeta.textContent = `After Round ${completedRounds}`;

    if (completedRounds === ROUNDS.length) {
      $champion.classList.add('show');
      $champName.textContent = standings[0].name;
    } else {
      $champion.classList.remove('show');
    }

    $completedCount.textContent = completedRounds;
    $progressFill.style.width = `${(completedRounds / ROUNDS.length) * 100}%`;
  }

  function renderAll() {
    renderRounds();
    renderLeaderboard();
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('view-' + t.dataset.view).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  $resetBtn.addEventListener('click', () => {
    if (!confirm('Reset the entire tournament? All results will be cleared.')) return;
    state = defaultState();
    saveState();
    renderAll();
    // Switch back to matches
    document.querySelector('.tab[data-view="matches"]').click();
  });

  renderAll();
</script>
</body>
</html>
